{% extends "base.html" %}
{% block content %}
<section id="game-app" class="game-app" data-seat-token="{{ seat_token }}">
  <div class="game-header panel">
    <div>
      <p class="eyebrow">{{ seat.display_name }}</p>
      <h1 id="game-title">Clue Table</h1>
    </div>
    <div id="turn-banner" class="turn-banner">Loading table state...</div>
  </div>
  <div class="layout-grid">
    <section class="panel board-panel">
      <div class="panel-head">
        <h2>Board</h2>
        <div id="phase-pill" class="phase-pill"></div>
      </div>
      <svg id="board" viewBox="0 0 720 560" class="board-svg"></svg>
      <div id="move-hints" class="move-hints"></div>
    </section>
    <section class="panel side-panel">
      <div class="panel-head">
        <h2>Your Seat</h2>
      </div>
      <div id="seat-summary"></div>
      <div class="hand-panel">
        <h3>Hand</h3>
        <ul id="hand-list"></ul>
      </div>
      <div class="notebook-panel">
        <div class="panel-head compact">
          <h3>Notebook</h3>
          <button id="save-notebook" type="button">Save</button>
        </div>
        <textarea id="notebook-text" rows="12" placeholder="Track deductions here."></textarea>
      </div>
    </section>
    <section class="panel action-panel">
      <div class="panel-head">
        <h2>Actions</h2>
      </div>
      <div id="action-controls"></div>
      <div class="chat-box">
        <label for="chat-input">Table Talk</label>
        <textarea id="chat-input" rows="3" placeholder="Public round-table discussion"></textarea>
        <button id="send-chat" type="button">Send Chat</button>
      </div>
    </section>
    <section class="panel seat-panel">
      <div class="panel-head">
        <h2>Seats</h2>
      </div>
      <ul id="seat-list" class="seat-list"></ul>
    </section>
    <section class="panel event-panel">
      <div class="panel-head">
        <h2>Event Log</h2>
      </div>
      <ul id="event-log" class="event-log"></ul>
    </section>
  </div>
</section>
<script src="{{ url_for('static', filename='js/clue.js') }}" defer></script>
{% endblock %}
