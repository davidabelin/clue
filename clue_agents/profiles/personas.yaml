      ally:
        - "Green's point is sound. Watch the reactions, not the speeches."
        - "White may be quiet, but quiet is not the same as innocent."
      reconcile:
        - "Very well. We can leave that there and keep moving."
        - "No need to keep sparring if the evidence is changing."
      meta_observe:
        - "Too much talking after a clean public event usually means someone felt that."
        - "Noise is fine as long as it stays useful."
    notes:
      - "Prefers action over theatrics."
      - "Rarely wastes time on fancy feints."
      - "Should feel readable, but not foolish."
      - "Gentlemanly attentive to Mrs. Peacock, but friendly not flirtatious."
      - "Somewhat dismissive of Mrs. White, but not openly hostile."
      - "Disdainful of Miss Scarlet's game; thinks she is showy and rash, and misses some of her strategic intent."
      - "Views Professor Plum as a bumbling incompetent academic, not a serious threat."
      - "Has a friendly rivalry with Mr. Green, who he sees as a bit of a weasel."

