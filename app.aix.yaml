runtime: python314
service: clue
entrypoint: gunicorn --timeout 180 --graceful-timeout 30 --worker-tmp-dir /tmp -b :$PORT run:app

beta_settings:
  cloud_sql_instances: aix-labs:us-west1:aix-sql

automatic_scaling:
  max_instances: 1

env_variables:
  APP_BASE_PATH: /clue
  AIX_HUB_URL: https://aix-labs.uw.r.appspot.com/
  CLUE_DATABASE_URL: ""
  CLUE_DATABASE_URL_SECRET: projects/aix-labs/secrets/clue-database-url/versions/latest
  CLUE_DB_PATH: /tmp/clue.db
  CLUE_SECRET_KEY: ""
  CLUE_SECRET_KEY_SECRET: projects/aix-labs/secrets/clue-secret-key/versions/latest
  CLUE_INTERNAL_WORKER_TOKEN: ""
  CLUE_ADMIN_TOKEN: ""
  CLUE_ADMIN_TOKEN_SECRET: projects/aix-labs/secrets/clue-admin-token/versions/latest
  CLUE_LLM_MODEL: gpt-5.4-mini-2026-03-17
  CLUE_LLM_REASONING_EFFORT: medium
  CLUE_LLM_TIMEOUT_SECONDS: "45"
  CLUE_LLM_MAX_TOOL_CALLS: "12"
  CLUE_AGENT_MAX_TURNS: "18"
  CLUE_AGENT_TRACING_ENABLED: "0"
  CLUE_AGENT_TRACE_INCLUDE_SENSITIVE_DATA: "0"
  CLUE_AGENT_SESSION_TTL_SECONDS: "900"
  CLUE_AGENT_SESSION_DB_PATH: /tmp/clue_agent_sessions.db
  CLUE_AGENT_SESSION_ENCRYPTION_KEY: ""
  CLUE_AGENT_EVAL_EXPORT_ENABLED: "0"
  OPENAI_CLUE_PROJECT_ID: proj_Lw53USO5NinnThSmUspUs1Kt
  OPENAI_CLUE_SA_KEY_SECRET_VERSION: projects/aix-labs/secrets/clue-openai-api-key/versions/latest

service_account: aix-admin@aix-labs.iam.gserviceaccount.com
